bundle:
  name: spark_transformations

include:
  - resources/*.yml

variables:
  catalog:
    description: Unity Catalog name
    default: workspace
  schema:
    description: Unity Catalog schema name
    default: default
  reprocess_days:
    description: Number of days to reprocess from (0 = use default cutoff)
    default: "0"
  environment:
    description: Environment suffix appended to table and metric view names
    default: dev
  sql_warehouse_id:
    description: SQL warehouse ID for metric view deployment
    default: ""

targets:
  dev:
    default: true
    mode: development
    variables:
      catalog: workspace
      schema: default
      reprocess_days: "0"
      environment: dev

  prod:
    mode: production
    variables:
      catalog: workspace
      schema: default
      reprocess_days: "0"
      environment: prod
