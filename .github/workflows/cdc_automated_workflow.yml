name: CDC_AUTOMATED_WORKFLOW

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Databricks bundle target
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  validate:
    name: Validate bundle
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v1

      - name: Validate Databricks bundle
        run: databricks bundle validate -t ${{ github.event.inputs.target || 'dev' }}

  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v1

      - name: Deploy bundle
        run: databricks bundle deploy -t ${{ github.event.inputs.target || 'dev' }}

      - name: Start DLT pipeline
        run: databricks bundle run employee_cdc_pipeline -t ${{ github.event.inputs.target || 'dev' }}

  deploy-metric-view:
    name: Deploy metric view
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v1

      - name: Create employee_metrics metric view
        run: |
          databricks sql execute \
            --warehouse-id "${{ secrets.SQL_WAREHOUSE_ID }}" \
            --file src/metric_views/employee_metrics.sql
