name: CDC_AUTOMATED_WORKFLOW

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Databricks bundle target
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install ruff

      - name: Ruff lint
        run: ruff check .

      - name: Import sort (isort rules)
        run: ruff check --select I .

      - name: Format check (Black-compatible)
        run: ruff format --check .

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests with 100% coverage
        run: pytest

  validate:
    name: Validate bundle
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main
        with:
          version: 0.297.2

      - name: Validate Databricks bundle
        run: databricks bundle validate -t ${{ github.event.inputs.target || 'dev' }}

  deploy:
    name: Deploy to Databricks
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main
        with:
          version: 0.297.2

      - name: Deploy bundle
        run: databricks bundle deploy -t ${{ github.event.inputs.target || 'dev' }}

      - name: Start DLT pipeline
        run: databricks bundle run employee_cdc_pipeline -t ${{ github.event.inputs.target || 'dev' }}

  deploy-metric-view:
    name: Deploy metric view
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main
        with:
          version: 0.297.2

      - name: Create employee_metrics metric view
        env:
          ENV: ${{ github.event.inputs.target || 'dev' }}
          SQL_WAREHOUSE_ID: ${{ secrets.SQL_WAREHOUSE_ID }}
        run: |
          sed "s/__ENV__/${ENV}/g" src/metric_views/employee_metrics.sql > /tmp/employee_metrics_${ENV}.sql
          RESPONSE=$(databricks api post /api/2.0/sql/statements --json "$(jq -n \
            --arg warehouse_id "$SQL_WAREHOUSE_ID" \
            --rawfile statement "/tmp/employee_metrics_${ENV}.sql" \
            '{warehouse_id: $warehouse_id, statement: $statement, wait_timeout: "50s"}')")
          STATE=$(echo "$RESPONSE" | jq -r '.status.state')
          if [ "$STATE" != "SUCCEEDED" ]; then
            echo "Metric view deployment failed with state: $STATE"
            echo "$RESPONSE" | jq .
            exit 1
          fi
          echo "Metric view deployed successfully"
