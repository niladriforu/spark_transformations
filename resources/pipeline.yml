resources:
  pipelines:
    # Resource key must change when target schema changes; DLT cannot update
    # target on an existing Default Storage catalog pipeline.
    employee_cdc_pipeline_main_dbdemos:
      name: cdc-workflow-${var.catalog}-${var.schema}-${bundle.target}
      catalog: ${var.catalog}
      target: ${var.schema}
      channel: CURRENT
      edition: ADVANCED
      serverless: true
      continuous: false
      configuration:
        pipeline.reprocess_days: ${var.reprocess_days}
        pipeline.environment: ${var.environment}
        pipeline.catalog: ${var.catalog}
        pipeline.schema: ${var.schema}
      root_path: ../src/transformations
      libraries:
        - glob:
            include: ../src/transformations/**
