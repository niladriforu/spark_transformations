resources:
  pipelines:
    employee_cdc_pipeline:
      name: employee-cdc-pipeline-${bundle.target}
      catalog: ${var.catalog}
      target: ${var.schema}
      channel: CURRENT
      edition: ADVANCED
      photon: true
      continuous: false
      configuration:
        pipeline.reprocess_days: ${var.reprocess_days}
      libraries:
        - file:
            path: ../src/transformations/schemas.py
        - file:
            path: ../src/transformations/schemas_silver.py
        - file:
            path: ../src/transformations/read_and_write_to_raw.py
        - file:
            path: ../src/transformations/read_and_write_to_silver.py
        - file:
            path: ../src/transformations/read_and_write_to_curated.py
