volumes:
  uc_managed_data:
  uc_metastore:

services:

  spark-master:
    image: apache/spark:3.5.3
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./data:/data
      - uc_managed_data:/home/unitycatalog/etc/data

  spark-worker:
    image: apache/spark:3.5.3
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master
    volumes:
      - ./data:/data
      - uc_managed_data:/home/unitycatalog/etc/data

  unity-catalog:
    image: unitycatalog/unitycatalog:latest
    ports:
      - "8081:8081"   # API only (root shows "Hello, Unity Catalog!")
    networks:
      default:
        aliases:
          - server   # name expected by unity-catalog-ui image
    volumes:
      - ./data:/data
      - uc_managed_data:/home/unitycatalog/etc/data
      - uc_metastore:/home/unitycatalog/etc/db

  unity-catalog-ui:
    image: unitycatalog/unitycatalog-ui:main
    ports:
      - "3000:3000"
    depends_on:
      - unity-catalog

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    ports:
      - "5001:5000"   # host 5001 — macOS often uses 5000 (AirPlay)
    volumes:
      - ./data/mlflow:/mlflow
    command: mlflow server --host 0.0.0.0 --backend-store-uri /mlflow

  jupyter:
    build: .
    ports:
      - "8888:8888"
      - "4040-4045:4040-4045"   # Spark application UI (Spark picks next port if 4040 is busy)
    volumes:
      - ./app:/app
      - ./data:/data
      - uc_managed_data:/home/unitycatalog/etc/data
    depends_on:
      - spark-master
      - spark-worker
      - unity-catalog
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - UC_URI=http://unity-catalog:8081
      - UC_CATALOG=unity